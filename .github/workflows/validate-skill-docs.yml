name: Validate Skill Docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate skill docs
        run: python scripts/validate_skill_docs.py

      - name: Install dependencies
        run: npm install

      - name: Run npm checks
        run: npm run check
